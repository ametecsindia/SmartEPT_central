; SmartEPT Central — raise PHP upload limits so 100MB+ installer files can be
; uploaded from the console Downloads screen (Central bug #3, 23-Jul-2026).
; PHP reads .user.ini per-directory under CGI/FastCGI (the common Laragon setup);
; under mod_php the same values are set in public/.htaccess instead.
upload_max_filesize = 256M
post_max_size = 260M
memory_limit = 512M
max_execution_time = 300
max_input_time = 300
